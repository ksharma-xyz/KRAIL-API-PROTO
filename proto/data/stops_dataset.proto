syntax = "proto3";

package app.krail.bff.proto.data;

option java_package = "app.krail.bff.proto.data";
option java_multiple_files = true;

// Stops dataset and routes dataset both reference TransportMode. The
// authoritative definition lives here; routes_dataset.proto imports this file.

// Geographic point. Decimal degrees, EPSG:4326.
message LatLng {
  // contract: required — latitude in decimal degrees.
  double lat = 1;
  // contract: required — longitude in decimal degrees.
  double lon = 2;
}

// Transport modes. Numeric values match NSW productClass to keep cross-referencing
// with NSW Open Data trivial; WALKING = 99 is a KRAIL convention for non-transit legs.
enum TransportMode {
  // contract: default for unknown values from older clients.
  TRANSPORT_MODE_UNSPECIFIED = 0;
  TRAIN = 1;
  METRO = 2;
  LIGHT_RAIL = 4;
  BUS = 5;
  COACH = 7;
  FERRY = 9;
  SCHOOL_BUS = 11;
  WALKING = 99;
}

// Versioned stops dataset distributed via GitHub Releases. The KRAIL app
// downloads on cold start (and every 24h) when the manifest version changes,
// and runs stop search locally against this file.
message StopsDataset {
  // contract: required — YYYYMMDD or semver tag identifying this dataset build.
  string version = 1;
  // contract: required — ISO-8601 UTC timestamp of when this dataset was built.
  string generated_at = 2;
  // contract: required — CC BY 4.0 attribution text. KRAIL surfaces this in About.
  string attribution = 3;
  // contract: required — non-empty list of stops.
  repeated DatasetStop stops = 4;
}

// One stop entry in the dataset.
message DatasetStop {
  // contract: required — city-namespaced from day one: "NSW:200060".
  string stop_id = 1;
  // contract: required — disassembledName / GTFS stop_name.
  string name = 2;
  // contract: optional — null when the stop has no published coordinates.
  optional LatLng position = 3;
  // contract: required — empty list is allowed (rare; typically a planning-only stop).
  repeated TransportMode modes = 4;
}
