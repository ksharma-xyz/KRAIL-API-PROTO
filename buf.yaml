version: v2

# buf v2 module config. Source of truth for the proto contract that BFF
# emits and KRAIL consumes. CI runs `buf lint` + `buf breaking` against
# the previous git tag. See .github/workflows/ci.yml.

modules:
  - path: proto

lint:
  use:
    - STANDARD
  except:
    # KRAIL-BFF protos use a flat package per file (no per-version sub-package).
    # Versioning is at the repo level via SemVer git tags, not per-package.
    - PACKAGE_VERSION_SUFFIX
    # Existing protos use snake_case file names without a directory matching the
    # package; we keep them as-is in v0.1.0 and revisit in a layout pass later.
    - PACKAGE_DIRECTORY_MATCH
    # trip.proto and the dataset protos live under proto/api/ with two
    # different package names (`app.krail.bff.proto` vs `.proto.data`).
    # Per request §7, v0.1.0 is "extract what exists, in place" — no
    # restructuring. Will revisit when proto/core/ shared types land.
    - PACKAGE_SAME_DIRECTORY
    # KRAIL-BFF's existing enum values omit the type prefix
    # (TRAIN, METRO instead of TRANSPORT_MODE_TRAIN). Renaming would be a
    # major-bump source-breaking change for both consumers — defer to a
    # later coordinated release.
    - ENUM_VALUE_PREFIX
    # Same reason: enum zero-values are TRANSPORT_MODE_UNSPECIFIED and
    # WALK_POSITION_UNSPECIFIED, which already follow the convention, but
    # buf's ENUM_ZERO_VALUE_SUFFIX expects a strict `_UNSPECIFIED` suffix
    # form that some codegen flavors trip on. Keep the existing names.
    - ENUM_ZERO_VALUE_SUFFIX

breaking:
  use:
    # WIRE_JSON catches anything that breaks JSON or wire-binary compatibility:
    # field number reuse, type changes, enum-value renames, oneof shape changes.
    # This is the strict mode the request doc §3 calls for.
    - WIRE_JSON
