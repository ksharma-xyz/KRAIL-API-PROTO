name: ci

# Runs on every PR + every push to main. Two jobs:
#   - lint       — buf lint (style + correctness) + buf build (parses cleanly).
#   - breaking   — buf breaking against the latest released tag. Skipped when
#                  there is no prior tag (e.g. before v0.1.0 cuts).
#
# A future `codegen-smoke` job will run Wire JVM + KMP-common codegen here
# once the smoke harness lands. Tracked in v0.2.0+; deliberately not part
# of v0.1.0 to keep the initial CI surface small.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: buf lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          # Pin to a known-good buf version. Bump deliberately, not by floating tag.
          version: '1.47.2'
      - name: buf lint
        run: buf lint
      - name: buf build
        # Compile to a binary FileDescriptorSet — proves every proto parses
        # and imports resolve.
        run: buf build -o /tmp/image.bin

  breaking:
    name: buf breaking
    runs-on: ubuntu-latest
    needs: lint
    # Run on PRs against main and on direct pushes to main.
    # Skip when no prior tag exists (initial repo state).
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `buf breaking` can resolve the previous tag.
          fetch-depth: 0
      - name: Find latest released tag
        id: prev-tag
        run: |
          latest=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1 || true)
          if [ -z "$latest" ]; then
            echo "No prior tag; skipping breaking-change check (this is expected before v0.1.0)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$latest" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: bufbuild/buf-setup-action@v1
        if: steps.prev-tag.outputs.skip == 'false'
        with:
          version: '1.47.2'
      - name: buf breaking against ${{ steps.prev-tag.outputs.tag }}
        if: steps.prev-tag.outputs.skip == 'false'
        run: |
          # WIRE_JSON catches anything that breaks JSON or wire-binary
          # compatibility — field number reuse, type changes, enum-value
          # renames, oneof shape changes. Scoped to the previous released tag.
          buf breaking --against ".git#tag=${{ steps.prev-tag.outputs.tag }}"

  version-check:
    # Sanity: version.txt should never be downgraded relative to the latest tag.
    # PRs that bump version.txt are caught here; the actual release is in release.yml.
    name: version.txt sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compare version.txt with latest tag
        run: |
          file_version=$(tr -d '[:space:]' < version.txt)
          if [ -z "$file_version" ]; then
            echo "::error::version.txt is empty"; exit 1
          fi
          latest_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1 || true)
          if [ -z "$latest_tag" ]; then
            echo "No prior tag — skipping comparison."
            exit 0
          fi
          tag_version="${latest_tag#v}"
          # Use sort -V (version sort). If file_version sorts >= tag_version we're fine.
          lowest=$(printf '%s\n%s\n' "$file_version" "$tag_version" | sort -V | head -n1)
          if [ "$lowest" != "$tag_version" ] && [ "$file_version" != "$tag_version" ]; then
            echo "::error::version.txt ($file_version) is lower than latest tag ($tag_version)"; exit 1
          fi
          echo "OK — version.txt=$file_version, latest tag=$latest_tag"
